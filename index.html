<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense & Budget Visualizer</h1>
            <div class="balance-card">
                <h2>TOTAL BALANCE</h2>
                <h3 id="total-balance">Rp 0,-</h3>
            </div>
            
            <div class="limit-section">
                <label for="budget-limit">Set Budget Limit:</label>
                <input type="number" id="budget-limit" placeholder="e.g. 100">
                <button id="save-limit-btn">Set Limit</button>
            </div>
        </header>

        <main>
            <section class="form-section">
                <h3>Add Transaction</h3>
                <form id="transaction-form">
                    <label for="item-name">Item Name</label>
                    <input type="text" id="item-name" required>

                    <label for="amount">Amount</label>
                    <input type="number" id="amount" step="0.01" required>

                    <label for="category">Category</label>
                    <div class="category-input-group">
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                        <button type="button" id="add-category-btn" title="Add new category">+</button>
                    </div>

                    <button type="submit" class="submit-btn">Add Transaction</button>
                </form>
            </section>

            <section class="dashboard-section">
                <div class="transactions-container">
                    <div class="transactions-header">
                        <h3>Transactions</h3>
                        <select id="sort-transactions">
                            <option value="default">Sort by...</option>
                            <option value="amount-asc">Amount (Low to High)</option>
                            <option value="amount-desc">Amount (High to Low)</option>
                            <option value="category">Category (A-Z)</option>
                        </select>
                    </div>
                    <ul id="transaction-list">
                        </ul>
                </div>

                <div class="chart-container">
                    <h3>Spending by Category</h3>
                    <canvas id="expense-chart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
